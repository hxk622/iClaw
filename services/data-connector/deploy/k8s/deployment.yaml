apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-connector
  namespace: iclaw
  labels:
    app: data-connector
    version: v1
    component: sync-service
spec:
  replicas: 2
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  selector:
    matchLabels:
      app: data-connector
  template:
    metadata:
      labels:
        app: data-connector
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2131"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: data-connector-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: data-connector
          image: iclaw/data-connector:${VERSION:-latest}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 2131
              protocol: TCP
          env:
            - name: ENV
              value: "prod"
            - name: LOG_LEVEL
              value: "info"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "2131"
            - name: WORKERS
              value: "2"
            - name: ENABLE_INCREMENTAL_SYNC
              value: "true"
            - name: MAX_CONCURRENT_TASKS
              value: "2"
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: data-connector-secrets
                  key: db-url
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
            requests:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: logs
              mountPath: /var/log/data-connector
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: logs
          emptyDir: {}
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: data-connector-sa
  namespace: iclaw
  labels:
    app: data-connector
---
apiVersion: v1
kind: Secret
metadata:
  name: data-connector-secrets
  namespace: iclaw
  labels:
    app: data-connector
type: Opaque
data:
  db-url: cG9zdGdyZXNxbDovL2ljbGF3X2FwcDpjaGFuZ2VfbWVfbm93QHBvc3RncmVzOjU0MzIvaWNsYXc= # base64 encoded example
