apiVersion: v1
kind: Service
metadata:
  name: data-connector
  namespace: iclaw
  labels:
    app: data-connector
    component: sync-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "2131"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 2131
      targetPort: http
      protocol: TCP
  selector:
    app: data-connector
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: data-connector-ingress
  namespace: iclaw
  labels:
    app: data-connector
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-rpm: "300"
spec:
  tls:
    - hosts:
        - data-connector.iclaw.io
      secretName: iclaw-tls
  rules:
    - host: data-connector.iclaw.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: data-connector
                port:
                  name: http
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: data-connector-monitor
  namespace: monitoring
  labels:
    app: data-connector
    release: prometheus
spec:
  selector:
    matchLabels:
      app: data-connector
  namespaceSelector:
    matchNames:
      - iclaw
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
