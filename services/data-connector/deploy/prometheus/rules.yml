groups:
  - name: data-connector-alerts
    rules:
      # 同步任务失败告警
      - alert: SyncTaskHighFailureRate
        expr: |
          sum by (task_name) (rate(sync_tasks_total{status="failed"}[5m]))
          /
          sum by (task_name) (rate(sync_tasks_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          service: data-connector
        annotations:
          summary: "同步任务失败率过高 (任务: {{ $labels.task_name }})"
          description: "任务 {{ $labels.task_name }} 过去5分钟失败率为 {{ $value | humanizePercentage }}，超过阈值5%"
          runbook: "https://wiki.iclaw.com/runbooks/data-connector/sync-task-failure"

      # 同步数据量异常告警
      - alert: SyncTaskDataVolumeAbnormal
        expr: |
          (
            sync_task_data_count
            <
            (avg_over_time(sync_task_data_count[1d]) * 0.7
          )
          or
          (
            sync_task_data_count
            >
            (avg_over_time(sync_task_data_count[1d]) * 1.3
          )
        for: 10m
        labels:
          severity: warning
          service: data-connector
        annotations:
          summary: "同步数据量异常 (任务: {{ $labels.task_name }})"
          description: "任务 {{ $labels.task_name }} 当前数据量为 {{ $value | humanize }}，与过去1天平均值偏差超过±30%"
          runbook: "https://wiki.iclaw.com/runbooks/data-connector/data-volume-abnormal"

      # 同步任务执行时间过长告警
      - alert: SyncTaskExecutionTimeTooLong
        expr: |
          max by (task_name) (sync_task_duration_seconds_sum / sync_task_duration_seconds_count) > 1800
        for: 5m
        labels:
          severity: warning
          service: data-connector
        annotations:
          summary: "同步任务执行时间过长 (任务: {{ $labels.task_name }})"
          description: "任务 {{ $labels.task_name }} 平均执行时间为 {{ $value | humanizeDuration }}，超过阈值30分钟"
          runbook: "https://wiki.iclaw.com/runbooks/data-connector/slow-task-execution"

      # 数据源熔断告警
      - alert: DataSourceCircuitBreakerTriggered
        expr: |
          sum by (task_name, data_source) (increase(sync_task_source_circuit_break_total[5m])) >= 3
        for: 1m
        labels:
          severity: critical
          service: data-connector
        annotations:
          summary: "数据源熔断触发 (任务: {{ $labels.task_name }}, 数据源: {{ $labels.data_source }})"
          description: "数据源 {{ $labels.data_source }} 在过去5分钟内熔断 {{ $value }} 次，已达到告警阈值"
          runbook: "https://wiki.iclaw.com/runbooks/data-connector/data-source-circuit-break"

      # 数据验证失败告警
      - alert: SyncTaskValidationFailure
        expr: |
          sum by (task_name, validation_type) (increase(sync_task_validation_failure_total[5m])) > 0
        for: 1m
        labels:
          severity: warning
          service: data-connector
        annotations:
          summary: "数据验证失败 (任务: {{ $labels.task_name }}, 验证类型: {{ $labels.validation_type }})"
          description: "任务 {{ $labels.task_name }} 过去5分钟 {{ $labels.validation_type }} 验证失败 {{ $value }} 次"
          runbook: "https://wiki.iclaw.com/runbooks/data-connector/validation-failure"

      # 服务不可用告警
      - alert: DataConnectorServiceDown
        expr: |
          up{job="data-connector"} == 0
        for: 1m
        labels:
          severity: critical
          service: data-connector
        annotations:
          summary: "数据同步服务不可用 (实例: {{ $labels.instance }})"
          description: "实例 {{ $labels.instance }} 已经下线超过1分钟"
          runbook: "https://wiki.iclaw.com/runbooks/data-connector/service-down"

      # 数据库连接异常告警
      - alert: DatabaseConnectionError
        expr: |
          (db_connections_active + db_connections_idle == 0
        for: 2m
        labels:
          severity: critical
          service: data-connector
        annotations:
          summary: "数据库连接异常"
          description: "数据库连接池没有可用连接，持续超过2分钟"
          runbook: "https://wiki.iclaw.com/runbooks/data-connector/database-connection-error"

      # 数据源请求错误率过高告警
      - alert: DataSourceHighErrorRate
        expr: |
          sum by (data_source) (rate(data_source_errors_total[5m]))
          /
          sum by (data_source) (rate(data_source_requests_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          service: data-connector
        annotations:
          summary: "数据源请求错误率过高 (数据源: {{ $labels.data_source }})"
          description: "数据源 {{ $labels.data_source }} 过去5分钟错误率为 {{ $value | humanizePercentage }}，超过阈值10%"
          runbook: "https://wiki.iclaw.com/runbooks/data-connector/data-source-error"

      # 高延迟告警
      - alert: HighHTTPRequestLatency
        expr: |
          histogram_quantile(0.95, sum by (le, endpoint) (rate(http_request_duration_seconds_bucket[5m]))) > 5
        for: 5m
        labels:
          severity: warning
          service: data-connector
        annotations:
          summary: "API请求延迟过高 (端点: {{ $labels.endpoint }})"
          description: "端点 {{ $labels.endpoint }} 95分位延迟为 {{ $value | humanizeDuration }}，超过阈值5秒"
          runbook: "https://wiki.iclaw.com/runbooks/data-connector/high-latency"