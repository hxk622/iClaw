# iClaw download site
# domain: iclaw.aiyuanxi.com

server {
    listen 80;
    server_name iclaw.aiyuanxi.com;

    access_log /var/log/nginx/iclaw-access.log;
    error_log  /var/log/nginx/iclaw-error.log;

    root /var/www/iclaw-home;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Download proxies to Aliyun prod MinIO bucket: iclaw-prod
    # Public objects are stored under downloads/<platform>/<arch>/...
    location /downloads/ {
        proxy_pass http://39.106.110.149:9000/iclaw-prod/;
        proxy_set_header Host 39.106.110.149:9000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS config is managed by certbot after issuance:
# certbot --nginx -d iclaw.aiyuanxi.com --non-interactive --agree-tos --register-unsafely-without-email --redirect
