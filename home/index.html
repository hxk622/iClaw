<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iClaw 官网</title>
    <meta name="description" content="iClaw 官网，面向普通用户的本地 AI 客户端。" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="./main.js"></script>
  </head>
  <body>
    <section class="hero" id="top">
      <img class="hero-art" src="/hero-art.svg" alt="iClaw hero artwork" />
      <div class="hero-overlay"></div>
      <div class="hero-floats">
        <img src="/hero-layer-1.svg" alt="iClaw visual layer one" class="float-card float-a spring-layer" />
        <img src="/hero-photo.jpg" alt="iClaw product visual" class="float-photo float-b spring-layer" />
      </div>
      <header class="hero-topbar">
        <div class="brand">
          <img src="/logo.png" alt="iClaw logo" class="brand-logo" />
          <span>iClaw</span>
        </div>
        <a href="#download" class="top-cta">下载</a>
      </header>

      <div class="hero-content spring-layer">
        <p class="kicker">Official Website</p>
        <h1 class="hero-title">
          <span class="hero-title-pre">让 AI 真正像软件一样，</span>
          <span class="hero-title-main"><span class="shine-text">装上就能用</span><span class="shine-mark">！</span></span>
        </h1>
        <p>
          iClaw 面向普通用户设计。少一点配置，多一点结果。
          打开、提问、执行、拿答案。
        </p>
        <a href="#download" class="scroll-down">
          <span>向下下载</span>
          <strong>↓</strong>
        </a>
      </div>
    </section>

    <section class="download" id="download" aria-labelledby="downloads-title">
      <div class="download-head">
        <h2 id="downloads-title">下载 iClaw</h2>
        <span id="env-pill" class="env-pill"></span>
      </div>
      <div id="downloads-grid" class="downloads-grid"></div>
    </section>
  </body>
</html>
