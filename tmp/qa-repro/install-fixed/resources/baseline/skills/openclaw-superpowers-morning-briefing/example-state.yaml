items_count: 4
status: delivered

# ── Walkthrough ──────────────────────────────────────────────────────────────
#
# On Monday morning, OpenClaw wakes at 07:00 (cron: "0 7 * * 1-5").
# It reads this state file and checks last_briefing_date:
#
#   IF last_briefing_date == today → skip (already delivered)
#   ELSE → compose briefing from sibling skill states + print + update state
#
# The briefing output looks like:
#
#   # Morning Briefing — Monday, March 15
#
#   ## Today's Priorities
#     • Finish auth module PR review
#     • Respond to design feedback on dashboard
#
#   ## Active Task
#     Task:   refactor-payments-v2
#     Goal:   Extract Stripe logic into dedicated service layer
#     Status: in_progress
#     Next:   Write unit tests for StripeService.charge()
#
#   ## Pending Handoff
#     No pending handoff
#
#   ---
#   Delivered at 07:02. Have a great day.
#
# After delivery, state is written back with the new timestamp so the
# next cron wakeup (tomorrow 07:00) will see today's date and skip.
