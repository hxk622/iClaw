<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OAuth Callback</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f2e8;
        color: #1d1d1b;
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .box {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="box">授权中，请稍候...</div>
    <script>
      (function () {
        var search = new URLSearchParams(window.location.search);
        var code = search.get('code');
        var state = search.get('state');
        var error = search.get('error');

        if (window.opener) {
          window.opener.postMessage(
            code
              ? { type: 'oauth-callback', code: code, state: state }
              : { type: 'oauth-callback', error: error || '授权失败' },
            window.location.origin,
          );
          window.setTimeout(function () {
            window.close();
          }, 300);
          return;
        }

        window.location.replace('/');
      })();
    </script>
  </body>
</html>
